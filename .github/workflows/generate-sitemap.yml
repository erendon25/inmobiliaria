name: Generate Daily Sitemap

on:
  schedule:
    # Executes at 05:00 UTC every day (12:00 AM Peru Time)
    - cron: '0 5 * * *'
  workflow_dispatch: # Allows manual execution from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Generate Sitemap
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/generate-sitemap.js

      - name: Commit and Push Sitemap
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/sitemap.xml
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update sitemap.xml [skip ci]" && git push)
